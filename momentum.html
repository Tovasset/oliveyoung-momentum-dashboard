function fmt(v,suf=''){return v===null||v===undefined?'<span class="meta">축적중</span>':(v>0?'<span class="up">+'+v+suf+'</span>':(v<0?'<span class="dn">'+v+suf+'</span>':'0'+suf));}
function table(rows, isOdm){
 let h='<table><tr><th>'+(isOdm?'ODM':'브랜드')+'</th><th>점수(7dMA)</th><th>MoM%</th><th class="wowh">WoW%</th><th>4주기울기</th><th>SKU폭</th>'
   +(isOdm?'<th>기여브랜드</th>':'<th>폭변화</th>')+'<th>지속(7일중)</th><th style="text-align:left">시그널</th></tr>';
 rows.forEach(r=>{h+='<tr'+(r.tags?' class="sig"':'')+'><td>'+r.name+'</td><td>'+r.ma7+'</td><td>'+fmt(r.mom,'%')+'</td><td class="wowc">'+fmt(r.wow,'%')
   +'</td><td>'+fmt(r.slope)+'</td><td>'+r.breadth+'</td><td>'+(isOdm?r.nbrands:fmt(r.bchg))
   +'</td><td>'+r.persist+'</td><td class="tagcell">'+(r.tags||'')+'</td></tr>';});
 return h+'</table>';
}
function chart(id, rows){
 const win=days.slice(-28);
 new Chart(document.getElementById(id),{type:'line',
  data:{labels:win,datasets:rows.slice(0,10).map((r,i)=>({label:r.name,data:r.spark,
    borderWidth:2,pointRadius:0,tension:.25}))},
  options:{plugins:{legend:{position:'bottom',labels:{boxWidth:12,font:{size:11}}}},
    scales:{x:{ticks:{maxTicksLimit:7,font:{size:10}}},y:{beginAtZero:true}}}});
}
function kdelta(it){
 if(it.new) return '<span class="new">🆕신규</span>';
 if(it.delta===null||it.delta===undefined) return '<span class="meta">–</span>';
 if(it.delta>0) return '<span class="up">▲'+it.delta+'</span>';
 if(it.delta<0) return '<span class="dn">▼'+(-it.delta)+'</span>';
 return '<span class="meta">−</span>';
}
function kbeautyBlock(kb){
 const baseline = !kb.prev_date;
 let h='<h2>🇰🇷 K뷰티 아마존 레이더 <span class="meta">('+kb.cur_date+' 기준 · '
   +(baseline?'베이스라인 수립일 — 순위변동은 내일 크롤부터 축적':'직전 '+kb.prev_date+' 대비 변동')+')</span></h2>';
 const active=kb.categories.filter(c=>c.kcount>0);
 const zero=kb.categories.filter(c=>c.kcount===0).map(c=>c.cat);
 // 카테고리 카드 (K뷰티 진입 카테고리만, 침투율 높은 순)
 active.sort((a,b)=>b.kshare-a.kshare);
 h+='<div class="kcats">';
 active.forEach(c=>{
  let chg='';
  if(c.kshare_prev!==null&&c.kshare_prev!==undefined){
   const d=+(c.kshare-c.kshare_prev).toFixed(1);
   chg=d>0?' <span class="up">▲'+d+'%p</span>':(d<0?' <span class="dn">▼'+(-d)+'%p</span>':'');
  }
  h+='<div class="kcard"><div class="kcard-h"><b>'+c.cat+'</b>'
    +'<span class="kshare">'+c.kshare+'%'+chg+' <span class="meta">'+c.kcount+'/'+c.total+'</span></span></div>';
  h+='<table class="kmini">';
  c.items.slice(0,8).forEach(it=>{
   h+='<tr><td class="kr">#'+it.rank+'</td><td class="kb">'+it.brand+'</td><td class="kd">'+kdelta(it)+'</td></tr>';
  });
  if(c.items.length>8) h+='<tr><td></td><td class="meta">외 '+(c.items.length-8)+'개</td><td></td></tr>';
  h+='</table></div>';
 });
 h+='</div>';
 if(zero.length) h+='<p class="note">K뷰티 미진입: '+zero.join(', ')+' — 향수·헤어·구강·툴·남성 카테고리는 아직 한국 브랜드 부재</p>';
 // 브랜드 롤업
 h+='<h3 style="font-size:14px;margin:16px 0 6px">전 카테고리 브랜드 롤업 <span class="meta">(최고순위순 · ▲▼=직전 대비)</span></h3>';
 h+='<table><tr><th>브랜드</th><th>최고순위</th><th>SKU수</th><th>카테고리수</th><th style="text-align:left">카테고리별 진입 순위</th></tr>';
 kb.rollup.forEach(r=>{
  const badge=r.newcnt>0?'<span class="kbadge">신규 '+r.newcnt+'</span>':'';
  h+='<tr><td>'+r.brand+badge+'</td><td>#'+r.best+'</td><td>'+r.nsku+'</td><td>'+r.ncats+'</td><td class="tagcell">'+r.cats+'</td></tr>';
 });
 h+='</table>';
 h+='<p class="note">순위=아마존 베스트셀러 카테고리 내 순위(낮을수록 상위). 침투율=카테고리 상위(최대 100위) 중 한국 브랜드 SKU 비중.'
   +'브랜드는 상품명에서 K뷰티 사전으로 식별해 한글 정규화 → 올리브영·오너/ODM 매핑과 자동 연결.</p>';
 return h;
}
function render(ch){
 const d=DATA.channels[ch];
 document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('on',b.textContent===ch));
 let sig=[]; d.brands.forEach(r=>{if(r.tags)sig.push(r)});
 let h='';
 if(!d.brands.length){h='<p>이 채널 데이터 없음</p>';}
 else{
  if(d.kbeauty){h+=kbeautyBlock(d.kbeauty);}
  const inv=(d.invest||[]);
  const invL=inv.filter(r=>r.listed);
  if(invL.length){
   h+='<h2>⓪ 투자 종목 보드 — 상장사만 <span class="meta">(MoM 월간모멘텀順 · WoW는 참고)</span></h2>';
   h+='<table><tr><th>회사</th><th>종목</th><th>경로</th><th>점수(7dMA)</th><th>MoM%</th><th class="wowh">WoW%</th><th style="text-align:left">관련 브랜드(MoM)</th><th>시그널</th></tr>';
   invL.forEach(r=>{h+='<tr'+(r.sig?' class="sig"':'')+'><td>'+r.company+'</td><td>'+r.ticker+'</td><td>'+r.route+'</td><td>'+r.ma7+'</td><td>'+fmt(r.mom,'%')+'</td><td class="wowc">'+fmt(r.wow,'%')+'</td><td class="tagcell">'+r.brands+'</td><td>'+r.sig+'</td></tr>';});
   h+='</table>';
   // ⓪-b 비상장 워치: 랭킹 존재감(점수) 있는 비상장 오너 = IPO·M&A 후보 (구다이글로벌 등)
   const invU=inv.filter(r=>!r.listed&&r.route!=='ODM'&&r.ma7>=20);
   if(invU.length){
    h+='<h2>⓪-b 비상장 워치 <span class="meta">(IPO·M&A 후보 — 랭킹 존재감順, MoM 성숙 시 자동갱신)</span></h2>';
    h+='<table><tr><th>회사</th><th>경로</th><th>점수(7dMA)</th><th>MoM%</th><th class="wowh">WoW%</th><th style="text-align:left">관련 브랜드(MoM)</th></tr>';
    invU.forEach(r=>{h+='<tr><td>'+r.company+'</td><td>'+r.route+'</td><td>'+r.ma7+'</td><td>'+fmt(r.mom,'%')+'</td><td class="wowc">'+fmt(r.wow,'%')+'</td><td class="tagcell">'+r.brands+'</td></tr>';});
    h+='</table>';
   }
   h+='<p class="note">MoM=최근 30일 관측평균÷직전 30일 −1 (WoW보다 안정적인 월간 모멘텀, 축적중이면 데이터 성숙 대기). 시그널🔥/⚠️는 MoM ±20% 기준. 브랜드 route=오너 직접매핑(owner_manual.csv)·ODM route=제조사 우회. 점수=브랜드 SKU점수합의 7관측일 평균, 실적 선행지표이지 매수신호 아님.</p>';
  }
  h+='<h2>① 시그널 보드 ('+sig.length+'건)</h2>'+(sig.length?table(sig,false):'<p class="note">현재 시그널 없음 (데이터 축적 중이거나 조건 미충족)</p>');
  h+='<div class="grid"><div><h2>② 브랜드 점수 추이 (상위 10)</h2><canvas id="c1" height="230"></canvas></div>';
  h+='<div><h2>③ ODM 점수 추이 (상위 10)</h2><canvas id="c2" height="230"></canvas></div></div>';
  h+='<h2>④ 브랜드 모멘텀 전체</h2>'+table(d.brands,false);
  h+='<h2>⑤ ODM 모멘텀</h2>'+(d.odms.length?table(d.odms,true):'<p class="note">ODM 매핑 없음 (아마존은 odm_manual.csv로 수동 매핑 가능)</p>');
 }
 document.getElementById('content').innerHTML=h;
 if(d.brands.length){chart('c1',d.brands);if(d.odms.length)chart('c2',d.odms);}
}
const chs=Object.keys(DATA.channels);
chs.forEach(ch=>{const b=document.createElement('button');b.textContent=ch;b.onclick=()=>render(ch);document.getElementById('tabs').appendChild(b);});
if(chs.length)render(chs[0]);
</script></body></html>
